<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тойға Шақыру | Азамат & Аружан</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #fdfaf6; }
        .cursive { font-family: 'Great Vibes', cursive; }
        .fade-in { animation: fadeIn 2s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="text-gray-800">

    <div class="min-h-screen flex flex-col items-center justify-center text-center p-5 fade-in">
        <h2 class="text-2xl uppercase tracking-widest mb-4">Тойға Шақыру</h2>
        <h1 class="cursive text-7xl text-amber-600 mb-6">Азамат & Аружан</h1>
        <p class="text-lg mb-8 italic text-gray-600">Біздің қуанышымыздың ортақ қонағы болыңыздар!</p>
        
        <div id="timer" class="flex gap-4 text-center mb-10">
            <div class="bg-white p-4 rounded-lg shadow-md w-20">
                <span id="days" class="text-2xl font-bold text-amber-600">00</span>
                <p class="text-xs uppercase">Күн</p>
            </div>
            <div class="bg-white p-4 rounded-lg shadow-md w-20">
                <span id="hours" class="text-2xl font-bold text-amber-600">00</span>
                <p class="text-xs uppercase">Сағат</p>
            </div>
            <div class="bg-white p-4 rounded-lg shadow-md w-20">
                <span id="minutes" class="text-2xl font-bold text-amber-600">00</span>
                <p class="text-xs uppercase">Мин</p>
            </div>
        </div>

        <div class="max-w-md bg-white p-8 rounded-3xl shadow-xl border border-amber-100">
            <h3 class="text-xl font-semibold mb-2">25 Маусым, 2026</h3>
            <p class="mb-4">Сағат 18:00-де басталады</p>
            <hr class="my-4 border-amber-200">
            <p class="font-medium text-amber-700">Мекен-жайы:</p>
            <p class="mb-6">Астана қаласы, "Алтын Сарай" рестораны</p>
            
            <a href="https://2gis.kz" class="inline-block bg-amber-600 text-white px-8 py-3 rounded-full hover:bg-amber-700 transition shadow-lg">
                Картаны ашу
            </a>
        </div>

        <div class="mt-12">
            <p class="mb-4 text-gray-500 italic">Келетініңізді растауыңызды сұраймыз:</p>
            <a href="https://wa.me/77472465381?text=Сәлеметсіз бе! Шақыруды алдық. Құдай қаласа тойға барамыз!" 
               class="flex items-center justify-center gap-2 bg-green-500 text-white px-10 py-4 rounded-full font-bold shadow-green-200 shadow-2xl hover:scale-105 transition-transform">
                WhatsApp-қа жауап беру
            </a>
        </div>
    </div>

    <script>
        // Таймер логикасы
        const weddingDate = new Date("June 25, 2026 18:00:00").getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const distance = weddingDate - now;

            const d = Math.floor(distance / (1000 * 60 * 60 * 24));
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

            document.getElementById("days").innerText = d;
            document.getElementById("hours").innerText = h;
            document.getElementById("minutes").innerText = m;
        }
        setInterval(updateTimer, 1000);
    </script>
</body>
</html>
