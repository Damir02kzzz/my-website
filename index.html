    <style>
        :root { --blue: #0056b3; --dark: #1a1a1a; --yellow: #ffcc00; --light: #f4f4f4; }
        body { font-family: sans-serif; margin: 0; background: var(--light); color: #333; }
        header { background: #fff; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-weight: bold; font-size: 1.2rem; }

        .plumb { background: var(--blue); }
        .weld { background: var(--dark); border-left: 5px solid var(--yellow); }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .grid img { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; background: #444; border: 1px solid rgba(255,255,255,0.2); }
        .btn { display: block; text-align: center; padding: 12px; background: #25d366; color: white; text-decoration: none; border-radius: 5px; margin-top: 15px; font-weight: bold; }
        footer { background: #222; color: #ccc; padding: 20px; text-align: center; font-size: 0.8rem; }
